name: PR checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write       # for OIDC to AWS
  pull-requests: write  # for posting cdk diff comments

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  app-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build, test, coverage
        run: ./gradlew build jacocoTestReport --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/

  app-static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

      # OWASP dependency check would go here in a real setup — omitted for runtime cost
      # - name: OWASP Dependency Check
      #   run: ./gradlew dependencyCheckAnalyze --no-daemon

  cdk-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install
        run: npm ci
        working-directory: infrastructure

      - name: Type check
        run: npx tsc --noEmit
        working-directory: infrastructure

      - name: CDK synth
        run: npx cdk synth --all
        working-directory: infrastructure

      - name: CDK unit tests
        run: npx jest
        working-directory: infrastructure

