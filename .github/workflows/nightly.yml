name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  AWS_REGION: eu-central-1

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v3

      # OWASP Dependency Check pulls fresh CVE data each run.
      # In a real org, this would file an issue on findings rather than fail silently.
      - name: Run dependency check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: app/build/reports/dependency-check-report.html

  drift-detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.READONLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install
        run: npm ci
        working-directory: infrastructure

      # Catches drift in stacks that are actually deployed. Stacks defined in source but
      # absent from CloudFormation (e.g., PaymentService while in idle mode per the
      # `running=true/false` context flag) are skipped — their absence is intentional, not drift.
      - name: CDK diff (deployed stacks only)
        id: diff
        run: |
          set -euo pipefail
          APP_STACKS=(PaymentBootstrap PaymentNetwork PaymentService)
          deployed=$(aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE IMPORT_COMPLETE \
            --query 'StackSummaries[].StackName' --output text)
          to_check=()
          for s in "${APP_STACKS[@]}"; do
            if grep -qw "$s" <<<"$deployed"; then
              to_check+=("$s")
            fi
          done
          if [ ${#to_check[@]} -eq 0 ]; then
            echo "No app stacks currently deployed; skipping drift check."
            exit 0
          fi
          echo "Diffing: ${to_check[*]}"
          npx cdk diff "${to_check[@]}" --fail
        working-directory: infrastructure

      - name: Open drift issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Infrastructure drift detected ${new Date().toISOString().slice(0,10)}`,
              body: 'Nightly drift detection found differences between the CDK source and the deployed stacks. Investigate.',
              labels: ['drift', 'infrastructure'],
            });

  ecr-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Keep only the last 10 ECR images
        run: |
          # TODO: implement via aws ecr batch-delete-image
          echo "TODO: prune old ECR images"
