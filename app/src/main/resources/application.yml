spring:
  application:
    name: payment-intent-service
  datasource:
    # Prefer a full SPRING_DATASOURCE_URL when set (local dev). Otherwise compose from
    # host/port/db parts so Aurora can supply them as separate Secrets Manager fields.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:payments}}
    username: ${SPRING_DATASOURCE_USERNAME:payments}
    password: ${SPRING_DATASOURCE_PASSWORD:payments}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.9, 0.99

outbox:
  poll-interval-ms: 1000
  batch-size: 50
  queue-url: ${OUTBOX_QUEUE_URL:}

processor:
  stub:
    auth-success-rate: 0.80
    decline-rate: 0.10
    timeout-rate: 0.05
    error-rate: 0.05
    hang-rate: 0.02
    base-latency-ms: 200

resilience4j:
  circuitbreaker:
    instances:
      paymentProcessor:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      paymentProcessor:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2
  bulkhead:
    instances:
      paymentProcessor:
        maxConcurrentCalls: 25
